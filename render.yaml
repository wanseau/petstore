services:
  # ── Backend (Docker) ─────────────────────────────────────────────────────────
  - type: web
    name: petstore-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: petstore-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: petstore-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: petstore-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: https://petstore-frontend-row4.onrender.com
      - key: DB_SSL_MODE
        value: require
      - key: PORT
        value: "8080"

  # ── Frontend (Static) ────────────────────────────────────────────────────────
  - type: web
    name: petstore-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend-6ppm.onrender.com

databases:
  - name: petstore-db
    plan: free
    databaseName: petstore
